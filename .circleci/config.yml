version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Run basic test
          command: |
            python -c "import fastapi, pandas, sklearn"

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Build Docker Image
          command: |
            docker build -t aiops-monitor .

      - run:
          name: Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Push Docker Image
          command: |
            docker tag aiops-monitor $DOCKER_USER/aiops-monitor:latest
            docker push $DOCKER_USER/aiops-monitor:latest

workflows:
  version: 2
  build_and_push:
    jobs:
      - build
