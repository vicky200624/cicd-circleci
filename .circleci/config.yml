version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.12

    environment:
      IMAGE_NAME: aiops-monitor

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: pip install -r requirements.txt

      - run:
          name: Test imports
          command: python -c "import fastapi, pandas, sklearn"

      - setup_remote_docker

      - run:
          name: Build Docker image
          command: docker build -t $IMAGE_NAME .

      - run:
          name: DockerHub Login
          command: echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Tag Docker Image
          command: docker tag $IMAGE_NAME $DOCKER_USER/$IMAGE_NAME:latest

      - run:
          name: Push Docker Image
          command: docker push $DOCKER_USER/$IMAGE_NAME:latest

workflows:
  version: 2
  build_and_push:
    jobs:
      - build
