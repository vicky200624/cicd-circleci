version: 2.1

jobs:
build:
docker:
- image: cimg/python:3.12

```
steps:
  - checkout

  - run:
      name: Install dependencies
      command: |
        pip install --upgrade pip
        pip install -r requirements.txt

  - run:
      name: Test imports
      command: |
        python -c "import fastapi"
        python -c "import pandas"
        python -c "import sklearn"

  - setup_remote_docker

  - run:
      name: Build Docker Image
      command: |
        docker build -t aiops-monitor .

  - run:
      name: Test Docker Container
      command: |
        docker run --rm aiops-monitor python -c "import fastapi"
```

workflows:
version: 2
build_pipeline:
jobs:
